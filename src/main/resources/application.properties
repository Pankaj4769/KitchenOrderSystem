# ── HikariCP Connection Pool ──────────────────────────────────────────────────
# pool-size=3 was starving when multiple SSE connections held Tomcat threads.
# Each open /order-stream held one thread; with 3+ tabs pool went to 0.
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
# max-lifetime must be LESS than MySQL's wait_timeout (typically 28800s / 8h on Hostinger)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000
# Validate connection before use — prevents "connection closed" errors
spring.datasource.hikari.connection-test-query=SELECT 1

# ── Logging ──────────────────────────────────────────────────────────────────
# Reduce security debug noise — was flooding logs with OPTIONS/GET entries
logging.level.org.springframework.security=WARN

