spring.application.name=kos

# Active profile - override via -Dspring.profiles.active=prod or env SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=local

# =========================================================================
# COMMON CONFIG (shared across all environments)
# Environment-specific values live in application-{local|dev|prod}.properties
# =========================================================================

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# HikariCP - tuned for SSE workload (each /order-stream holds one Tomcat thread)
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
# max-lifetime must be LESS than MySQL wait_timeout (typically 28800s / 8h on Hostinger)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# Reduce security debug noise - was flooding logs with OPTIONS/GET entries
logging.level.org.springframework.security=INFO

# Mail SMTP protocol settings (host/credentials are per-environment)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Trial subscription configuration
subscription.trial.duration-days=14
subscription.trial.warning-days=3
