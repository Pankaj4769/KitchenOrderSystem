# =========================================================================
# PROD profile - production
# Secrets should be supplied via env vars, NOT committed here.
# Example:  DB_PASSWORD=... MAIL_PASSWORD=... java -jar kos.jar
# =========================================================================

#server.port=8082

# In Stage 2 (R2) override ITEM_IMAGE_PUBLIC_BASE_URL with the R2 CDN URL
# (e.g. https://images.kos.com) so <img> requests bypass Spring entirely.
item.image.upload.path=${ITEM_IMAGE_UPLOAD_PATH:/var/kos/uploads/}
item.image.public-base-url=${ITEM_IMAGE_PUBLIC_BASE_URL:/restaurant-images}

# DB - inject secrets via environment
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/kos?useSSL=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Never echo SQL in prod
spring.jpa.show-sql=false
# Don't auto-migrate schema in prod - use Flyway/Liquibase or manual scripts
spring.jpa.hibernate.ddl-auto=validate

spring.security.user.name=${ADMIN_USERNAME}
spring.security.user.password=${ADMIN_PASSWORD}

spring.mail.host=${MAIL_HOST:smtp.hostinger.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Real payment gateway in prod
payment.gateway=razorpay
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}

app.log.dir=${APP_LOG_DIR:/var/log/kos}
app.log.file=kos-app-prod.log

# Quieter logs in prod
logging.level.com.kos=INFO
# Silence per-request controller Entering/Exiting traces in prod (errors/warnings still print)
logging.level.com.kos.controller=WARN
logging.level.org.hibernate=WARN
